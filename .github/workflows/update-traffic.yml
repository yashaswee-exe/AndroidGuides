name: Update Repository Traffic Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Traffic Data
        run: |
          REPO="yashaswee-exe/AndroidGuides"

          VIEWS=$(curl -s \
            -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
            https://api.github.com/repos/$REPO/traffic/views | jq '.count')

          UNIQUES=$(curl -s \
            -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
            https://api.github.com/repos/$REPO/traffic/views | jq '.uniques')

          CLONES=$(curl -s \
            -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
            https://api.github.com/repos/$REPO/traffic/clones | jq '.count')

          UNIQUE_CLONES=$(curl -s \
            -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
            https://api.github.com/repos/$REPO/traffic/clones | jq '.uniques')

          cat <<EOF > Dashboard.md
          # 📊 AndroidGuides Analytics Dashboard

          ## 👀 Traffic Overview (Last 14 Days)

          | Metric | Value |
          |--------|-------|
          | 🔎 Total Views | **$VIEWS** |
          | 👤 Unique Visitors | **$UNIQUES** |
          | 📥 Total Clones | **$CLONES** |
          | 🧑‍💻 Unique Cloners | **$UNIQUE_CLONES** |

          _Last Updated: $(date -u) UTC_
          EOF

      - name: Clone Wiki
        run: |
          git clone https://x-access-token:${{ secrets.TRAFFIC_TOKEN }}@github.com/yashaswee-exe/AndroidGuides.wiki.git

      - name: Update Wiki Page
        run: |
          cp Dashboard.md AndroidGuides.wiki/Analytics-Dashboard.md
          cd AndroidGuides.wiki
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Analytics-Dashboard.md
          git commit -m "Auto update analytics dashboard" || echo "No changes"
          git push
