- name: Fetch Traffic Data
  run: |
    REPO="yashaswee-exe/AndroidGuides"

    VIEWS=$(curl -s \
      -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
      https://api.github.com/repos/$REPO/traffic/views | jq '.count')

    UNIQUES=$(curl -s \
      -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
      https://api.github.com/repos/$REPO/traffic/views | jq '.uniques')

    CLONES=$(curl -s \
      -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
      https://api.github.com/repos/$REPO/traffic/clones | jq '.count')

    UNIQUE_CLONES=$(curl -s \
      -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
      https://api.github.com/repos/$REPO/traffic/clones | jq '.uniques')

    echo "## 📊 Repository Traffic (Last 14 Days)" > Stats.md
    echo "" >> Stats.md
    echo "### 👀 Views" >> Stats.md
    echo "- Total Views: **$VIEWS**" >> Stats.md
    echo "- Unique Visitors: **$UNIQUES**" >> Stats.md
    echo "" >> Stats.md
    echo "### 📥 Clones" >> Stats.md
    echo "- Total Clones: **$CLONES**" >> Stats.md
    echo "- Unique Cloners: **$UNIQUE_CLONES**" >> Stats.md
    echo "" >> Stats.md
    echo "_Last Updated: $(date -u) UTC_" >> Stats.md
