name: Update Repository Traffic Stats

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:

jobs:
  update-traffic:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: |
          echo "${{ secrets.TRAFFIC_TOKEN }}" | gh auth login --with-token

      - name: Fetch Traffic Data
  run: |
    REPO="yashaswee-exe/AndroidGuides"

    VIEWS=$(curl -s \
      -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
      https://api.github.com/repos/$REPO/traffic/views | jq '.count')

    UNIQUES=$(curl -s \
      -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
      https://api.github.com/repos/$REPO/traffic/views | jq '.uniques')

    CLONES=$(curl -s \
      -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
      https://api.github.com/repos/$REPO/traffic/clones | jq '.count')

    UNIQUE_CLONES=$(curl -s \
      -H "Authorization: token ${{ secrets.TRAFFIC_TOKEN }}" \
      https://api.github.com/repos/$REPO/traffic/clones | jq '.uniques')

    echo "## 📊 Repository Traffic (Last 14 Days)" > Stats.md
    echo "" >> Stats.md
    echo "### 👀 Views" >> Stats.md
    echo "- Total Views: **$VIEWS**" >> Stats.md
    echo "- Unique Visitors: **$UNIQUES**" >> Stats.md
    echo "" >> Stats.md
    echo "### 📥 Clones" >> Stats.md
    echo "- Total Clones: **$CLONES**" >> Stats.md
    echo "- Unique Cloners: **$UNIQUE_CLONES**" >> Stats.md
    echo "" >> Stats.md
    echo "_Last Updated: $(date -u) UTC_" >> Stats.md
      - name: Clone Wiki
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/yashaswee-exe/AndroidGuides.wiki.git

      - name: Update Wiki Page
        run: |
          cp Stats.md AndroidGuides.wiki/Traffic-Stats.md
          cd AndroidGuides.wiki
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Traffic-Stats.md
          git commit -m "Auto update traffic stats"
          git push
